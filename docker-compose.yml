services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: andrew-server
    ports:
      - "4500:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - IMGPROXY_URL=http://andrew-imgproxy:8080
      - IMGPROXY_PUBLIC_URL=https://andrewimages.harrison-martin.com
    networks:
      - andrew-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: andrew-imgproxy
    ports:
      - "4501:8080"
    environment:
      - IMGPROXY_ALLOW_ORIGIN=*
      - IMGPROXY_MAX_SRC_RESOLUTION=50
      - IMGPROXY_BIND=:8080
      - IMGPROXY_ALLOWED_SOURCES=local:///,http://,https://
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/images
      - IMGPROXY_ENFORCE_WEBP=true
      - IMGPROXY_ENFORCE_AVIF=true
      - IMGPROXY_PREFERRED_FORMATS=avif,webp
    volumes:
      - ./server/public:/images:ro
    networks:
      - andrew-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: andrew-client
    ports:
      - "4502:80"
    depends_on:
      - server
      - imgproxy
    networks:
      - andrew-network
    restart: unless-stopped

networks:
  andrew-network:
    driver: bridge